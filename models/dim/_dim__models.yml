version: 2

models:
  - name: dim_tornado_intensity
    description: Normalized F and EF damage ratings. Unrecognized or missing source ratings are represented by the explicit `Unknown` member.
    columns:
      - name: rating_code
        description: "Normalized F or EF rating code (for example F3, EF2), or the literal value Unknown for a missing or unrecognized source rating. Primary key of this dimension."
        data_tests:
          - not_null
          - unique
      - name: scale_system
        description: "Which damage scale rating_code uses: F (pre-2007 Fujita scale), EF (Enhanced Fujita scale, 2007 onward), or Unknown."
        data_tests:
          - accepted_values:
              arguments:
                values: ["F", "EF", "Unknown"]
      - name: rating_value
        description: "Numeric severity within the F or EF scale (0-5), parsed from rating_code. Null when scale_system is Unknown."
      - name: intensity_class
        description: "Three-tier grouping of rating_value: Weak (0-1), Strong (2-3), or Violent (4-5), or Unknown when rating_value is null."
      - name: wind_estimate_low_mph
        description: "Low end of the three-second gust wind speed range associated with this rating, inferred from damage rather than measured directly. Null when scale_system is Unknown."
      - name: wind_estimate_high_mph
        description: "High end of the three-second gust wind speed range associated with this rating, inferred from damage rather than measured directly. Null when scale_system is Unknown, and for EF5, whose high end is unbounded by definition."
      - name: wind_estimate_note
        description: "Caveat describing how the wind estimate was derived: an EF-scale or F-scale damage-based estimate, or an explanatory note when scale_system is Unknown and no rating-based estimate applies."
  - name: dim_geography
    description: >
      One row per distinct state and county combination observed in confirmed NCEI tornado
      events, carrying the three project-defined cohort membership flags (Alabama, Dixie,
      Tornado) derived from state via the cohort_flags macro.
    columns:
      - name: state
        description: Two-letter state code.
      - name: county
        description: NCEI CZ_NAME county or zone name, as reported (not standardized beyond source casing).
      - name: is_alabama
        description: True when state = AL.
      - name: is_dixie_cohort
        description: True when state is in the project-defined Dixie comparison cohort (AL, AR, GA, LA, MS, TN).
      - name: is_tornado_cohort
        description: True when state is in the project-defined Tornado comparison cohort (CO, IA, KS, NE, OK, SD, TX).
