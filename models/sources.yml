version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: ncei_tornado_events
        description: Filtered NOAA NCEI Storm Events tornado records for the project analysis cohorts.
        columns:
          - name: event_id
            tests: [not_null, unique]
          - name: event_type
            tests:
              - accepted_values:
                  arguments:
                    values: ["Tornado"]
      - name: preliminary_tornado_reports
        description: Preliminary Iowa State Mesonet Local Storm Report tornado point reports after the latest confirmed NCEI event.
        columns:
          - name: report_id
            tests: [not_null, unique]
          - name: report_type
            tests:
              - accepted_values:
                  arguments:
                    values: ["TORNADO"]
