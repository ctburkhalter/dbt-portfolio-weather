version: 2
sources:
  - name: iem
    description: Iowa State Mesonet preliminary Local Storm Reports loaded by the Python ingestion layer.
    schema: raw
    tables:
      - name: preliminary_tornado_reports
        description: One raw preliminary IEM tornado point report.
        config:
          loaded_at_field: "cast(fetched_at as timestamp)"
          freshness:
            warn_after: {count: 2, period: day}
            error_after: {count: 7, period: day}
        columns:
          - name: report_id
            description: Stable hash of the source report fields used by this ingestion run.
            data_tests: [not_null, unique]
          - name: report_type
            description: IEM report type, restricted to TORNADO by ingestion.
            data_tests:
              - accepted_values:
                  arguments: {values: [TORNADO]}
          - name: fetched_at
            description: UTC timestamp when the report was retrieved.
