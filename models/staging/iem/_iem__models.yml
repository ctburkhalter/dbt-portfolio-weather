version: 2
models:
  - name: stg_iem__preliminary_tornado_reports
    description: One row per preliminary IEM tornado point report, renamed and typed for downstream use.
    columns:
      - name: event_id
        description: Source-native synthetic IEM report identifier.
        data_tests: [not_null, unique]
      - name: occurred_at
        description: UTC report timestamp.
        data_tests: [not_null]
      - name: occurred_at_utc
        description: UTC report instant, identical to occurred_at.
        data_tests: [not_null]
      - name: occurred_at_utc_offset
        description: Explicit +00:00 publication offset.
        data_tests: [not_null]
      - name: state
        description: Two-letter state code.
        data_tests: [not_null]
