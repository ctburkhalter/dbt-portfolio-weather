name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - name: Contract smoke test (demo fixture through dbt build and publish_dashboard.py)
        env:
          DBT_DUCKDB_PATH: /tmp/ci-check.duckdb
          DBT_PROFILES_DIR: .
        run: |
          python ingestion/load_ncei_events.py --input data/demo_storm_events.csv --database "$DBT_DUCKDB_PATH"
          # Populates an empty (but correctly typed) preliminary_tornado_reports
          # raw table without any network call: an end == start range takes the
          # early-return path in fetch_preliminary_tornado_reports.main before
          # it would otherwise hit the IEM API, which this fast, hermetic PR
          # gate should never depend on.
          python ingestion/fetch_preliminary_tornado_reports.py --start 2020-01-01T00:00:00+00:00 --end 2020-01-01T00:00:00+00:00 --database "$DBT_DUCKDB_PATH"
          dbt build
          python scripts/publish_dashboard.py --database "$DBT_DUCKDB_PATH" --output /tmp/ci-check-public/data
          python tests/contract_smoke_check.py --output /tmp/ci-check-public/data
